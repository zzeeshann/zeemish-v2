#:schema node_modules/wrangler/config-schema.json

name = "zeemish-v2"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"

[assets]
directory = "./dist"
binding = "ASSETS"

# When you verify zeemish.io on Resend, change this:
[vars]
EMAIL_FROM = "Zeemish <hello@zeemish.io>"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "zeemish"
database_id = "f3cdccbf-7cea-4af1-b524-20f6a6fe1dd4"

# Service binding to the agents worker.
# Workers on .workers.dev cannot fetch each other via HTTP (Cloudflare
# error 1042). Service bindings call the target worker in-process with
# no network hop. Used by /api/agents/trigger to proxy manual admin
# triggers through to the agents worker's /daily-trigger endpoint.
[[services]]
binding = "AGENTS"
service = "zeemish-agents"
