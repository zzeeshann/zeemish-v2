#:schema node_modules/wrangler/config-schema.json

name = "zeemish-v2"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"

[assets]
directory = "./dist"
binding = "ASSETS"

# When you verify zeemish.io on Resend, change this:
[vars]
EMAIL_FROM = "Zeemish <hello@zeemish.io>"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "zeemish"
database_id = "f3cdccbf-7cea-4af1-b524-20f6a6fe1dd4"

# Rate-limit counters for login, magic-link, upgrade, Zita chat. KV is
# eventually consistent, which is fine for soft limits. Previous Map-based
# limiter reset on every isolate recycle — effectively no limit.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "47638cd187a240ddb5d446770be144ea"
preview_id = "5756895b3c6b491c9760ef8c38eb16b6"

# Service binding to the agents worker.
# Workers on .workers.dev cannot fetch each other via HTTP (Cloudflare
# error 1042). Service bindings call the target worker in-process with
# no network hop. Used by /api/agents/trigger to proxy manual admin
# triggers through to the agents worker's /daily-trigger endpoint.
[[services]]
binding = "AGENTS"
service = "zeemish-agents"

# R2 bucket for per-beat MP3 audio generated by AudioProducerAgent.
# Same bucket as the agents worker writes to. The site worker only
# READS from it, serving files via middleware at /audio/*. Keeps
# audio URLs same-origin so no CORS surface is needed and so
# frontmatter's relative `/audio/...` URLs resolve without changes
# when the site moves to a custom domain.
[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "zeemish-audio"
