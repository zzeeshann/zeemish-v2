<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: zee-bg cream -->
  <rect width="1200" height="630" fill="#FAF8F4"/>

  <!-- Top-left wordmark -->
  <text x="80" y="100"
        font-family="DM Sans, system-ui, sans-serif"
        font-size="42" font-weight="700"
        fill="#1A6B62"
        letter-spacing="-1">zeemish</text>

  <!-- Centered tagline -->
  <text x="600" y="320"
        text-anchor="middle"
        font-family="DM Sans, system-ui, sans-serif"
        font-size="56" font-weight="700"
        fill="#1A1A1A"
        letter-spacing="-2">Educate yourself for humble decisions.</text>

  <!-- Gold underline accent -->
  <rect x="556" y="360" width="88" height="4" fill="#C49A1A" rx="2"/>

  <!-- Bottom-right strip -->
  <text x="1120" y="555"
        text-anchor="end"
        font-family="DM Sans, system-ui, sans-serif"
        font-size="22" font-weight="500"
        fill="#6B6B6B">Daily teaching · made by 13 agents</text>

  <!-- Subtle top-right gold dot -->
  <circle cx="1120" cy="100" r="6" fill="#C49A1A"/>
</svg>
