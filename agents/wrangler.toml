#:schema node_modules/wrangler/config-schema.json

name = "zeemish-agents"
main = "src/server.ts"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Durable Object bindings — one per agent class
[[durable_objects.bindings]]
name = "DIRECTOR"
class_name = "DirectorAgent"


[[durable_objects.bindings]]
name = "VOICE_AUDITOR"
class_name = "VoiceAuditorAgent"

[[durable_objects.bindings]]
name = "STRUCTURE_EDITOR"
class_name = "StructureEditorAgent"

[[durable_objects.bindings]]
name = "FACT_CHECKER"
class_name = "FactCheckerAgent"

[[durable_objects.bindings]]
name = "INTEGRATOR"
class_name = "IntegratorAgent"

[[durable_objects.bindings]]
name = "PUBLISHER"
class_name = "PublisherAgent"

# SQLite storage for agent state
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DirectorAgent", "CuratorAgent", "DrafterAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["VoiceAuditorAgent", "StructureEditorAgent", "FactCheckerAgent", "IntegratorAgent"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["PublisherAgent"]

[[durable_objects.bindings]]
name = "OBSERVER"
class_name = "ObserverAgent"

[[durable_objects.bindings]]
name = "LEARNER"
class_name = "LearnerAgent"

[[migrations]]
tag = "v4"
new_sqlite_classes = ["ObserverAgent"]

[[durable_objects.bindings]]
name = "AUDIO_PRODUCER"
class_name = "AudioProducerAgent"

[[durable_objects.bindings]]
name = "AUDIO_AUDITOR"
class_name = "AudioAuditorAgent"

# --- Migration history (DO NOT EDIT; entries below are immutable) ---
# v5  created EngagementAnalystAgent + ReviserAgent (both later refactored away)
# v8  renamed ReviserAgent → LearnerAgent
# v9  deleted EngagementAnalystAgent (merged into LearnerAgent)
# v10 deleted Curator/Drafter
# v11 recreated Curator/Drafter with SQLite storage
# Active classes: DirectorAgent (v1), VoiceAuditor/StructureEditor/
# FactChecker/Integrator (v2), Publisher (v3), Observer/Learner (v4),
# AudioProducer/AudioAuditor (v6), Scanner (v7), Curator/Drafter (v11).
[[migrations]]
tag = "v5"
new_sqlite_classes = ["EngagementAnalystAgent", "ReviserAgent"]

[[durable_objects.bindings]]
name = "SCANNER"
class_name = "ScannerAgent"

[[durable_objects.bindings]]
name = "CURATOR"
class_name = "CuratorAgent"

[[durable_objects.bindings]]
name = "DRAFTER"
class_name = "DrafterAgent"

[[migrations]]
tag = "v6"
new_sqlite_classes = ["AudioProducerAgent", "AudioAuditorAgent"]

[[migrations]]
tag = "v7"
new_sqlite_classes = ["ScannerAgent"]

[[migrations]]
tag = "v8"
renamed_classes = [{from = "ReviserAgent", to = "LearnerAgent"}]

[[migrations]]
tag = "v9"
deleted_classes = ["EngagementAnalystAgent"]

[[migrations]]
tag = "v10"
deleted_classes = ["CuratorAgent", "DrafterAgent"]

[[migrations]]
tag = "v11"
new_sqlite_classes = ["CuratorAgent", "DrafterAgent"]

[[durable_objects.bindings]]
name = "CATEGORISER"
class_name = "CategoriserAgent"

[[migrations]]
tag = "v12"
new_sqlite_classes = ["CategoriserAgent"]

[[durable_objects.bindings]]
name = "INTERACTIVE_GENERATOR"
class_name = "InteractiveGeneratorAgent"

[[migrations]]
tag = "v13"
new_sqlite_classes = ["InteractiveGeneratorAgent"]

[[durable_objects.bindings]]
name = "INTERACTIVE_AUDITOR"
class_name = "InteractiveAuditorAgent"

[[migrations]]
tag = "v14"
new_sqlite_classes = ["InteractiveAuditorAgent"]

# R2 bucket for audio storage
[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "zeemish-audio"

# D1 for shared data (tasks log, audit results)
[[d1_databases]]
binding = "DB"
database_name = "zeemish"
database_id = "f3cdccbf-7cea-4af1-b524-20f6a6fe1dd4"


# Secrets (set via: wrangler secret put ANTHROPIC_API_KEY)
# ANTHROPIC_API_KEY — required for Claude API calls
